            tags: ["Interaction Design", "AI", "Learning Sciences"],

          {
            id: 3,

            year: "2024",

            id: 4,
            title: "FYP Frenzy: Strategy Card Game",

            tags: ["Game Design", "Tabletop", "Strategy"],

        // --- Components ---
        const CustomCursor = ({ cursorVariant, cursorText }) => {
          const mouseX = useMotionValue(-100);
          const mouseY = useMotionValue(-100);
          const springConfig = { damping: 30, stiffness: 500, mass: 0.5 };
          const cursorX = useSpring(mouseX, springConfig);
          const cursorY = useSpring(mouseY, springConfig);

          useEffect(() => {
            const moveCursor = (e) => {
              mouseX.set(e.clientX);
              mouseY.set(e.clientY);
            };
            window.addEventListener("mousemove", moveCursor);
            return () => window.removeEventListener("mousemove", moveCursor);
          }, [mouseX, mouseY]);

          const variants = {
            default: { height: 12, width: 12, backgroundColor: "rgb(255, 255, 255)", mixBlendMode: "difference" },
            text: { height: 60, width: 60, backgroundColor: "rgb(255, 255, 255)", mixBlendMode: "difference" },
            project: { height: 80, width: 80, backgroundColor: "rgba(0, 0, 0, 0.9)", mixBlendMode: "normal" }
          };

          return (
            <motion.div
              className="fixed top-0 left-0 rounded-full pointer-events-none z-[9999] flex items-center justify-center hidden md:flex"
              style={{ translateX: "-50%", translateY: "-50%", x: cursorX, y: cursorY }}
              variants={variants}
              animate={cursorVariant}
            >
              <AnimatePresence>
                {cursorVariant === 'project' && (
                  <motion.span
                    initial={{ opacity: 0, scale: 0.8 }}
                    animate={{ opacity: 1, scale: 1 }}
                    exit={{ opacity: 0, scale: 0.5 }}
                    className="text-white text-[10px] font-bold tracking-widest uppercase"

                    {cursorText}
                  </motion.span>
                )}
              </AnimatePresence>
            </motion.div>
          );

            </motion.h2>
          </div>
        );

                          {exp.description.map((item, idx) => (
